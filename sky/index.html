<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Vision — Cloud & Sky Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0f1e;
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      color: #e8f4ff;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .sky-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, #060b18 0%, #0d1b3e 40%, #1a2a5e 70%, #0f1a35 100%);
      overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%; background: white;
      animation: twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100% { opacity: var(--mn,.15); transform: scale(1); }
      50%      { opacity: var(--mx,.85); transform: scale(1.3); }
    }
    .aurora {
      position: absolute; bottom: 0; left: -20%; width: 140%; height: 60%;
      background:
        radial-gradient(ellipse at 30% 80%, rgba(56,189,248,.07) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 90%, rgba(99,102,241,.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(34,211,238,.05) 0%, transparent 40%);
      animation: aurora 8s ease-in-out infinite alternate;
    }
    @keyframes aurora {
      from { opacity:.5; transform:scaleX(1) translateY(0); }
      to   { opacity:1;  transform:scaleX(1.05) translateY(-10px); }
    }

    /* ── Layout ── */
    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
      max-width: 520px;
      margin: 0 auto;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Header ── */
    header { text-align: center; padding-top: 1.5rem; }
    .logo-icon {
      font-size: 3rem; display: block; margin-bottom: .5rem;
      filter: drop-shadow(0 0 20px rgba(56,189,248,.6));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 2rem;
      letter-spacing: -.03em;
      background: linear-gradient(135deg,#93c5fd,#38bdf8,#67e8f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.1;
    }
    .subtitle {
      margin-top: .4rem; font-size: .7rem;
      color: rgba(148,163,184,.8); letter-spacing: .15em; text-transform: uppercase;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed rgba(56,189,248,.3);
      border-radius: 20px; padding: 2.5rem 1.5rem;
      text-align: center; cursor: pointer;
      transition: all .3s ease;
      background: rgba(15,30,60,.5); backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
    }
    .upload-zone::before {
      content:''; position:absolute; inset:0;
      background: linear-gradient(135deg,rgba(56,189,248,.03),rgba(99,102,241,.03));
      opacity:0; transition:opacity .3s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: rgba(56,189,248,.7);
      box-shadow: 0 0 30px rgba(56,189,248,.15), inset 0 0 30px rgba(56,189,248,.05);
      transform: translateY(-2px);
    }
    .upload-zone:hover::before, .upload-zone.drag-over::before { opacity:1; }
    .upload-icon { font-size:2.5rem; margin-bottom:.8rem; display:block; opacity:.8; }
    .upload-text { font-size:.85rem; color:rgba(148,163,184,.9); line-height:1.6; }
    .upload-text strong {
      color:#38bdf8; display:block;
      font-family:'Syne',sans-serif; font-size:.95rem; margin-bottom:.2rem;
    }
    .cam-btn {
      margin-top:1.2rem;
      display:inline-flex; align-items:center; gap:.5rem;
      background: linear-gradient(135deg,rgba(56,189,248,.15),rgba(99,102,241,.15));
      border: 1px solid rgba(56,189,248,.4);
      color:#93c5fd; padding:.6rem 1.4rem; border-radius:50px;
      font-family:'Space Mono',monospace; font-size:.75rem;
      cursor:pointer; transition:all .2s; letter-spacing:.05em;
    }
    .cam-btn:hover {
      background: linear-gradient(135deg,rgba(56,189,248,.25),rgba(99,102,241,.25));
      transform:scale(1.03);
    }

    /* ── Preview ── */
    .preview-wrap {
      position:relative; border-radius:20px; overflow:hidden;
      border:1px solid rgba(56,189,248,.2);
      box-shadow:0 8px 40px rgba(0,0,0,.4),0 0 0 1px rgba(56,189,248,.1);
    }
    .preview-img { width:100%; max-height:320px; object-fit:cover; display:block; }
    .preview-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top,rgba(6,11,24,.8) 0%,transparent 50%);
    }
    .change-btn {
      position:absolute; top:.8rem; right:.8rem;
      background:rgba(6,11,24,.7); border:1px solid rgba(56,189,248,.3);
      color:#93c5fd; padding:.35rem .8rem; border-radius:50px;
      font-size:.65rem; cursor:pointer;
      font-family:'Space Mono',monospace; transition:all .2s;
      backdrop-filter:blur(8px); letter-spacing:.05em;
    }
    .change-btn:hover { background:rgba(56,189,248,.2); }

    /* ── Analyze button ── */
    .analyze-btn {
      width:100%; padding:1rem 2rem;
      background:linear-gradient(135deg,#0ea5e9,#6366f1);
      border:none; border-radius:16px;
      color:white; font-family:'Syne',sans-serif;
      font-weight:700; font-size:1rem; letter-spacing:.05em;
      cursor:pointer; transition:all .3s;
      box-shadow:0 4px 20px rgba(14,165,233,.3);
      text-transform:uppercase; position:relative; overflow:hidden;
    }
    .analyze-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      opacity:0; transition:opacity .2s;
    }
    .analyze-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 30px rgba(14,165,233,.4); }
    .analyze-btn:hover:not(:disabled)::after { opacity:1; }
    .analyze-btn:active:not(:disabled) { transform:translateY(0); }
    .analyze-btn:disabled { opacity:.5; cursor:not-allowed; }

    /* ── Loading ── */
    .loading-wrap { text-align:center; padding:3rem 1rem; }
    .loading-orb { width:80px; height:80px; margin:0 auto 1.5rem; position:relative; }
    .orb-ring {
      position:absolute; inset:0; border-radius:50%;
      border:2px solid transparent;
      animation:spin var(--spd) linear infinite;
    }
    .orb-ring:nth-child(1) { border-top-color:#38bdf8;  --spd:1.2s; }
    .orb-ring:nth-child(2) { inset:8px;  border-right-color:#6366f1; --spd:1.8s; animation-direction:reverse; }
    .orb-ring:nth-child(3) { inset:16px; border-bottom-color:#67e8f9; --spd:2.4s; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text {
      color:rgba(148,163,184,.8); font-size:.75rem;
      letter-spacing:.15em; text-transform:uppercase;
      animation:blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.4} 50%{opacity:1} }

    /* ── Result ── */
    .result-card {
      background:rgba(15,30,60,.6);
      border:1px solid rgba(56,189,248,.2);
      border-radius:24px; overflow:hidden;
      backdrop-filter:blur(12px);
      box-shadow:0 8px 40px rgba(0,0,0,.3);
      animation:slideUp .5s cubic-bezier(.16,1,.3,1);
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .result-header {
      padding:1.5rem 1.5rem 1rem;
      border-bottom:1px solid rgba(56,189,248,.1);
      display:flex; align-items:center; gap:1rem;
    }
    .result-emoji { font-size:2.5rem; filter:drop-shadow(0 0 12px rgba(56,189,248,.5)); }
    .result-title-wrap { flex:1; }
    .result-label { font-size:.6rem; color:#38bdf8; letter-spacing:.2em; text-transform:uppercase; margin-bottom:.2rem; }
    .result-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; color:#e8f4ff; line-height:1.1; }
    .result-body { padding:1.2rem 1.5rem; display:flex; flex-direction:column; gap:1.2rem; }
    .desc-text { font-size:.82rem; color:rgba(203,213,225,.9); line-height:1.8; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; }
    .stat-chip {
      background:rgba(56,189,248,.07);
      border:1px solid rgba(56,189,248,.15);
      border-radius:14px; padding:.8rem 1rem;
    }
    .stat-label { font-size:.6rem; color:rgba(148,163,184,.6); letter-spacing:.15em; text-transform:uppercase; margin-bottom:.3rem; }
    .stat-val { font-family:'Syne',sans-serif; font-weight:700; font-size:.95rem; color:#93c5fd; }
    .tags-row { display:flex; flex-wrap:wrap; gap:.5rem; }
    .tag {
      background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.3);
      color:#a5b4fc; padding:.3rem .8rem; border-radius:50px;
      font-size:.68rem; letter-spacing:.05em;
    }
    .advice-box {
      background:rgba(34,211,238,.05); border:1px solid rgba(34,211,238,.2);
      border-radius:14px; padding:1rem 1.2rem;
    }
    .advice-label {
      font-size:.6rem; color:#22d3ee; letter-spacing:.15em;
      text-transform:uppercase; margin-bottom:.5rem;
      display:flex; align-items:center; gap:.4rem;
    }
    .advice-text { font-size:.8rem; color:rgba(203,213,225,.85); line-height:1.7; }
    .reset-btn {
      width:100%; padding:.7rem; background:transparent;
      border:1px solid rgba(148,163,184,.2); border-radius:12px;
      color:rgba(148,163,184,.6); font-family:'Space Mono',monospace;
      font-size:.7rem; cursor:pointer; transition:all .2s; letter-spacing:.1em;
    }
    .reset-btn:hover { border-color:rgba(148,163,184,.4); color:rgba(148,163,184,.9); }
    .error-box {
      background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25);
      border-radius:16px; padding:1.2rem 1.5rem;
      color:#fca5a5; font-size:.8rem; line-height:1.6; text-align:center;
      animation:slideUp .4s ease;
    }

    /* ── Hidden inputs ── */
    input[type=file] { display:none; }
  </style>
</head>
<body>

<div class="sky-bg" id="skyBg"></div>

<div class="app">
  <header>
    <span class="logo-icon">🌤</span>
    <h1>Sky Vision</h1>
    <p class="subtitle">Cloud & Sky Analyzer</p>
  </header>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <span class="upload-icon">📸</span>
    <div class="upload-text">
      <strong>อัปโหลดรูปท้องฟ้า</strong>
      วางไฟล์ที่นี่ หรือคลิกเพื่อเลือก
    </div>
    <button class="cam-btn" id="camBtn">📷 ถ่ายรูปเดี๋ยวนี้</button>
  </div>

  <!-- File inputs -->
  <input type="file" id="fileInput" accept="image/*" />
  <input type="file" id="camInput"  accept="image/*" capture="environment" />

  <!-- Preview -->
  <div class="preview-wrap" id="previewWrap" style="display:none">
    <img class="preview-img" id="previewImg" src="" alt="sky preview" />
    <div class="preview-overlay"></div>
    <button class="change-btn" id="changeBtn">✕ เปลี่ยนรูป</button>
  </div>

  <!-- Analyze button -->
  <button class="analyze-btn" id="analyzeBtn" style="display:none">🔭 วิเคราะห์ท้องฟ้า</button>

  <!-- Loading -->
  <div class="loading-wrap" id="loadingWrap" style="display:none">
    <div class="loading-orb">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
    </div>
    <p class="loading-text">กำลังสแกนท้องฟ้า...</p>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox" style="display:none"></div>

  <!-- Result -->
  <div class="result-card" id="resultCard" style="display:none">
    <div class="result-header">
      <span class="result-emoji" id="resEmoji"></span>
      <div class="result-title-wrap">
        <div class="result-label">ผลการวิเคราะห์</div>
        <div class="result-title" id="resTitle"></div>
      </div>
    </div>
    <div class="result-body">
      <p class="desc-text" id="resDesc"></p>
      <div class="stats-grid">
        <div class="stat-chip"><div class="stat-label">ปริมาณเมฆ</div><div class="stat-val" id="sCoverage"></div></div>
        <div class="stat-chip"><div class="stat-label">ทัศนวิสัย</div><div class="stat-val" id="sVisibility"></div></div>
        <div class="stat-chip"><div class="stat-label">ระดับความสูง</div><div class="stat-val" id="sAltitude"></div></div>
        <div class="stat-chip"><div class="stat-label">แนวโน้มอากาศ</div><div class="stat-val" id="sOutlook"></div></div>
      </div>
      <div class="tags-row" id="resTags"></div>
      <div class="advice-box">
        <div class="advice-label">💡 คำแนะนำ</div>
        <p class="advice-text" id="resAdvice"></p>
      </div>
      <button class="reset-btn" id="resetBtn">↩ วิเคราะห์ภาพใหม่</button>
    </div>
  </div>
</div>

<script>
  /* ── Stars ── */
  const bg = document.getElementById('skyBg');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    Object.assign(s.style, {
      left: Math.random() * 100 + '%',
      top:  Math.random() * 100 + '%',
      width:  size + 'px', height: size + 'px',
      '--dur':   (Math.random() * 4 + 2).toFixed(1) + 's',
      '--delay': (Math.random() * 5).toFixed(1) + 's',
      '--mn': (Math.random() * 0.15 + 0.05).toFixed(2),
      '--mx': (Math.random() * 0.5  + 0.4 ).toFixed(2),
    });
    bg.appendChild(s);
  }
  const aurora = document.createElement('div');
  aurora.className = 'aurora';
  bg.appendChild(aurora);

  /* ── State ── */
  let currentFile = null;
  let currentMime = 'image/jpeg';

  /* ── DOM refs ── */
  const uploadZone  = document.getElementById('uploadZone');
  const fileInput   = document.getElementById('fileInput');
  const camInput    = document.getElementById('camInput');
  const camBtn      = document.getElementById('camBtn');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg  = document.getElementById('previewImg');
  const changeBtn   = document.getElementById('changeBtn');
  const analyzeBtn  = document.getElementById('analyzeBtn');
  const loadingWrap = document.getElementById('loadingWrap');
  const errorBox    = document.getElementById('errorBox');
  const resultCard  = document.getElementById('resultCard');
  const resetBtn    = document.getElementById('resetBtn');

  /* ── File handling ── */
  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    currentFile = file;
    currentMime = file.type;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    uploadZone.style.display  = 'none';
    previewWrap.style.display = 'block';
    analyzeBtn.style.display  = 'block';
    resultCard.style.display  = 'none';
    errorBox.style.display    = 'none';
  }

  function reset() {
    currentFile = null;
    previewImg.src = '';
    uploadZone.style.display  = 'block';
    previewWrap.style.display = 'none';
    analyzeBtn.style.display  = 'none';
    loadingWrap.style.display = 'none';
    resultCard.style.display  = 'none';
    errorBox.style.display    = 'none';
    fileInput.value = '';
    camInput.value  = '';
  }

  uploadZone.addEventListener('click', () => fileInput.click());
  camBtn.addEventListener('click', e => { e.stopPropagation(); camInput.click(); });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  camInput.addEventListener('change',  e => handleFile(e.target.files[0]));
  changeBtn.addEventListener('click', reset);
  resetBtn.addEventListener('click',  reset);

  uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  /* ── Base64 ── */
  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  /* ── Analyze ── */
  analyzeBtn.addEventListener('click', async () => {
    if (!currentFile) return;

    analyzeBtn.style.display  = 'none';
    loadingWrap.style.display = 'block';
    errorBox.style.display    = 'none';
    resultCard.style.display  = 'none';

    try {
      const b64 = await toBase64(currentFile);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: currentMime, data: b64 } },
              { type: 'text', text: `วิเคราะห์ท้องฟ้าและก้อนเมฆในภาพนี้อย่างละเอียด แล้วตอบกลับในรูปแบบ JSON เท่านั้น (ไม่มี markdown backtick หรือข้อความอื่น) ตามโครงสร้างนี้:
{
  "skyEmoji": "อีโมจิที่เหมาะสมกับสภาพท้องฟ้า",
  "skyType": "ชื่อประเภทท้องฟ้า/เมฆภาษาไทย",
  "description": "คำอธิบายสิ่งที่เห็นในภาพ 2-3 ประโยค",
  "cloudCoverage": "ปริมาณเมฆ เช่น 0%, 25%, 50%",
  "visibility": "ระดับทัศนวิสัย เช่น ดีเยี่ยม, ดี, ปานกลาง",
  "estimatedAltitude": "ระดับความสูงโดยประมาณ หรือ N/A",
  "weatherOutlook": "แนวโน้มอากาศ เช่น แจ่มใส, อาจมีฝน",
  "tags": ["tag1","tag2","tag3"],
  "advice": "คำแนะนำสำหรับการถ่ายภาพหรือกิจกรรมกลางแจ้ง"
}` }
            ]
          }]
        })
      });

      const data = await res.json();
      const text = data.content?.find(b => b.type === 'text')?.text || '{}';
      const result = JSON.parse(text);

      document.getElementById('resEmoji').textContent    = result.skyEmoji    || '🌥';
      document.getElementById('resTitle').textContent    = result.skyType     || 'ท้องฟ้า';
      document.getElementById('resDesc').textContent     = result.description || '';
      document.getElementById('sCoverage').textContent   = result.cloudCoverage    || '—';
      document.getElementById('sVisibility').textContent = result.visibility        || '—';
      document.getElementById('sAltitude').textContent   = result.estimatedAltitude || '—';
      document.getElementById('sOutlook').textContent    = result.weatherOutlook    || '—';
      document.getElementById('resAdvice').textContent   = result.advice            || '';
      document.getElementById('resTags').innerHTML =
        (result.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');

      loadingWrap.style.display = 'none';
      resultCard.style.display  = 'block';

    } catch (err) {
      loadingWrap.style.display = 'none';
      analyzeBtn.style.display  = 'block';
      errorBox.textContent      = '⚠️ ไม่สามารถวิเคราะห์ภาพได้ กรุณาลองใหม่อีกครั้ง';
      errorBox.style.display    = 'block';
    }
  });
</script>
</body>
</html>
