<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>กะปริมาณอาหาร — kittisap.me</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1117; --surface:#111827; --surface2:#1a2236; --surface3:#222d42;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f4ff; --text2:#8896b0; --text3:#3d4f6e;
  --blue:#4a9eff; --blue-dim:rgba(74,158,255,0.1);
  --green:#34d399; --green-dim:rgba(52,211,153,0.1);
  --red:#f87171; --red-dim:rgba(248,113,113,0.1);
  --yellow:#f9c74f; --yellow-dim:rgba(249,199,79,0.1);
  --orange:#fb923c; --orange-dim:rgba(251,146,60,0.1);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.1);
  --radius:14px; --radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(74,158,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(14,17,23,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-family:'Space Mono',monospace;font-size:.78rem;color:var(--green);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.brand-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.topbar-right{display:flex;align-items:center;gap:8px}
.back-btn{font-size:.7rem;color:var(--text3);text-decoration:none;font-family:'Space Mono',monospace;transition:color .2s;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.back-btn:hover{color:var(--blue);border-color:var(--blue)}
.btn-sm{font-family:'Space Mono',monospace;font-size:.65rem;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
.btn-sm:hover{background:var(--surface2);color:var(--text)}
.btn-sm.active{background:var(--green-dim);border-color:rgba(52,211,153,.3);color:var(--green)}

/* ── WRAP ── */
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px 16px;padding-bottom:max(40px,env(safe-area-inset-bottom))}

/* ── TDEE CARD ── */
.tdee-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;cursor:pointer;transition:border-color .2s;position:relative}
.tdee-card:hover{border-color:var(--border2)}
.tdee-card-header{display:flex;align-items:center;justify-content:space-between}
.tdee-card-title{font-size:.78rem;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;letter-spacing:.04em;text-transform:uppercase}
.tdee-card-arrow{font-size:.7rem;color:var(--text3);transition:transform .2s}
.tdee-card.open .tdee-card-arrow{transform:rotate(180deg)}
.tdee-nums{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.tdee-num{display:flex;flex-direction:column;gap:2px}
.tdee-num-val{font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--green)}
.tdee-num-label{font-size:.62rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.tdee-progress{margin-top:12px}
.tdee-progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.tdee-progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .5s}
.tdee-progress-label{font-size:.68rem;color:var(--text3);font-family:'Space Mono',monospace;display:flex;justify-content:space-between}
.tdee-setup{padding:16px 0 0;border-top:1px solid var(--border);margin-top:14px;display:none}
.tdee-card.open .tdee-setup{display:block}
.tdee-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.f-group{display:flex;flex-direction:column;gap:4px}
.f-label{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.f-input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-family:'Sora',sans-serif;font-size:.84rem;outline:none;transition:border-color .2s;width:100%}
.f-input:focus{border-color:var(--green)}
select.f-input option{background:var(--surface2)}
.f-group.full{grid-column:1/-1}
.btn-calc{width:100%;padding:10px;background:var(--green);color:#0e1117;font-family:'Space Mono',monospace;font-size:.75rem;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;letter-spacing:.03em}
.btn-calc:hover{background:#4ade90}

/* ── MEAL SUMMARY ── */
.meal-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.meal-summary.empty{display:none}
.meal-total{font-family:'Space Mono',monospace}
.meal-total-val{font-size:1.4rem;font-weight:700;color:var(--yellow)}
.meal-total-label{font-size:.62rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.meal-items{flex:1;display:flex;flex-wrap:wrap;gap:6px}
.meal-chip{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:4px 10px;font-size:.72rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.meal-chip-remove{color:var(--red);cursor:pointer;font-size:.8rem;line-height:1}
.meal-chip-remove:hover{color:#ff9999}
.btn-clear{font-family:'Space Mono',monospace;font-size:.62rem;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid rgba(248,113,113,.2);background:var(--red-dim);color:var(--red);cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-clear:hover{background:var(--red);color:#0e1117}

/* ── SEARCH & FILTER ── */
.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'Sora',sans-serif;font-size:.84rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--text3)}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{font-family:'Space Mono',monospace;font-size:.62rem;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.filter-btn.active{background:var(--blue-dim);color:var(--blue);border-color:rgba(74,158,255,.3)}
.filter-btn:hover:not(.active){background:var(--surface2);color:var(--text2)}

/* ── FOOD GRID ── */
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.food-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.food-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cat-color,var(--blue));opacity:0;transition:opacity .2s}
.food-card:hover,.food-card.selected{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.food-card:hover::before,.food-card.selected::before{opacity:1}
.food-card.selected{background:var(--surface2)}
.food-card.hidden{display:none}
.food-icon{font-size:1.6rem;margin-bottom:8px;display:block;line-height:1}
.food-name{font-size:.84rem;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.3}
.food-meta{font-size:.68rem;color:var(--text3);margin-bottom:6px;font-family:'Space Mono',monospace}
.food-cal{font-size:.78rem;font-weight:700;font-family:'Space Mono',monospace;color:var(--yellow)}
.food-cat-badge{position:absolute;top:10px;right:10px;font-size:.52rem;font-family:'Space Mono',monospace;padding:2px 6px;border-radius:100px;background:var(--surface3);color:var(--text3);letter-spacing:.06em}
.food-qty-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.qty-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--surface3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s}
.qty-btn:hover{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.qty-val{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--text);min-width:16px;text-align:center;font-weight:700}

/* ── PAGING ── */
.paging{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:24px}
.page-btn{font-family:'Space Mono',monospace;font-size:.68rem;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;min-width:34px}
.page-btn:hover:not(:disabled){background:var(--surface2);color:var(--text)}
.page-btn.active{background:var(--blue-dim);border-color:rgba(74,158,255,.3);color:var(--blue)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-family:'Space Mono',monospace;font-size:.62rem;color:var(--text3)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:2rem;margin-bottom:10px;opacity:.5}

/* ── TOAST ── */
.toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 18px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--text);z-index:200;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:32px;gap:10px;color:var(--text3);font-family:'Space Mono',monospace;font-size:.72rem}
.spinner{width:18px;height:18px;border:2px solid var(--surface3);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .food-grid{grid-template-columns:1fr 1fr}
  .tdee-form-grid{grid-template-columns:1fr}
  .f-group.full{grid-column:1}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-dot"></div>
    กะปริมาณอาหาร
  </div>
  <div class="topbar-right">
    <a href="../admin/" class="btn-sm">⚙ Admin</a>
    <a href="../" class="back-btn">← Portal</a>
  </div>
</header>

<div class="wrap">

  <!-- TDEE CARD -->
  <div class="tdee-card" id="tdeeCard" onclick="toggleTDEE()">
    <div class="tdee-card-header">
      <div class="tdee-card-title">🔥 พลังงานที่ต้องการ / วัน</div>
      <span class="tdee-card-arrow">▾</span>
    </div>
    <div class="tdee-nums" id="tdeeNums">
      <div style="font-size:.78rem;color:var(--text3);padding:4px 0">กดเพื่อตั้งค่าข้อมูลสุขภาพ →</div>
    </div>
    <div class="tdee-setup">
      <div class="tdee-form-grid">
        <div class="f-group">
          <label class="f-label">เพศ</label>
          <select id="td_gender" class="f-input">
            <option value="male">ชาย</option>
            <option value="female">หญิง</option>
          </select>
        </div>
        <div class="f-group">
          <label class="f-label">อายุ (ปี)</label>
          <input type="number" id="td_age" class="f-input" placeholder="25" min="10" max="100">
        </div>
        <div class="f-group">
          <label class="f-label">น้ำหนัก (กก.)</label>
          <input type="number" id="td_weight" class="f-input" placeholder="65" min="30" max="200">
        </div>
        <div class="f-group">
          <label class="f-label">ส่วนสูง (ซม.)</label>
          <input type="number" id="td_height" class="f-input" placeholder="170" min="100" max="250">
        </div>
        <div class="f-group full">
          <label class="f-label">ระดับกิจกรรม</label>
          <select id="td_activity" class="f-input">
            <option value="1.2">นั่งทำงาน ไม่ค่อยออกกำลัง</option>
            <option value="1.375">ออกกำลังกายเบา 1–3 วัน/สัปดาห์</option>
            <option value="1.55" selected>ออกกำลังกายปานกลาง 3–5 วัน/สัปดาห์</option>
            <option value="1.725">ออกกำลังกายหนัก 6–7 วัน/สัปดาห์</option>
            <option value="1.9">งานหนักมาก / นักกีฬา</option>
          </select>
        </div>
        <div class="f-group full">
          <label class="f-label">เป้าหมาย</label>
          <select id="td_goal" class="f-input">
            <option value="0.8">ลดน้ำหนัก (–20%)</option>
            <option value="0.9">ลดน้ำหนักเล็กน้อย (–10%)</option>
            <option value="1.0" selected>รักษาน้ำหนัก</option>
            <option value="1.1">เพิ่มน้ำหนักเล็กน้อย (+10%)</option>
            <option value="1.2">เพิ่มน้ำหนัก (+20%)</option>
          </select>
        </div>
      </div>
      <button class="btn-calc" onclick="event.stopPropagation();calcTDEE()">คำนวณ</button>
    </div>
  </div>

  <!-- MEAL SUMMARY -->
  <div class="meal-summary" id="mealSummary">
    <div class="meal-total">
      <div class="meal-total-val" id="mealTotalVal">0</div>
      <div class="meal-total-label">kcal วันนี้</div>
    </div>
    <div class="meal-items" id="mealItems"></div>
    <button class="btn-clear" onclick="clearMeal()">ล้าง</button>
  </div>

  <!-- SEARCH & FILTER -->
  <div class="search-row">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 ค้นหาเมนู..." oninput="onSearch()">
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="setFilter('all',this)">ทั้งหมด</button>
    <button class="filter-btn" onclick="setFilter('ข้าว/แป้ง',this)">🍚 ข้าว/แป้ง</button>
    <button class="filter-btn" onclick="setFilter('เส้น',this)">🍜 เส้น</button>
    <button class="filter-btn" onclick="setFilter('กับข้าว',this)">🍲 กับข้าว</button>
    <button class="filter-btn" onclick="setFilter('โปรตีน',this)">🥩 โปรตีน</button>
    <button class="filter-btn" onclick="setFilter('ของทานเล่น',this)">🥟 ของทานเล่น</button>
    <button class="filter-btn" onclick="setFilter('ผลไม้/ของหวาน',this)">🍓 ผลไม้/ของหวาน</button>
    <button class="filter-btn" onclick="setFilter('เครื่องดื่ม',this)">🥤 เครื่องดื่ม</button>
  </div>

  <!-- FOOD GRID -->
  <div class="food-grid" id="foodGrid">
    <div class="loading"><div class="spinner"></div> กำลังโหลด...</div>
  </div>

  <!-- PAGING -->
  <div class="paging" id="paging"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qquxotxrwnzxyutzlwim.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxdXhvdHhyd256eHl1dHpsd2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzU5MDEsImV4cCI6MjA5NDY1MTkwMX0.vEu40LwSAhWhu1T4Mm_uFeWD3YRjptg0q0VshnYUXHM';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const PER_PAGE = 10;
const CAT_COLORS = {
  'ข้าว/แป้ง': 'var(--yellow)',
  'เส้น': 'var(--orange)',
  'กับข้าว': 'var(--green)',
  'โปรตีน': 'var(--blue)',
  'ของทานเล่น': 'var(--purple)',
  'ผลไม้/ของหวาน': 'var(--red)',
  'ผัก': '#4ade80',
  'เครื่องดื่ม': '#22d3ee',
};

let allFoods = [];
let filtered = [];
let meal = {};
let currentFilter = 'all';
let currentPage = 1;
let searchQ = '';
let tdeeData = null;

// ── INIT ──
async function init() {
  loadProfile();
  await loadFoods();
  renderMeal();
}

// ── FOODS: load from Supabase DB ──
async function loadFoods() {
  document.getElementById('foodGrid').innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div> กำลังโหลด...</div>';
  try {
    const { data, error } = await db.from('food_items').select('*').eq('visible', true).order('category').order('name');
    if(error) throw error;
    allFoods = (data || []).map(r => ({
      id: r.id,
      icon: r.icon || '🍽',
      name: r.name,
      unit: r.unit || '',
      grams: r.grams || 0,
      cal: r.cal || 0,
      cat: r.category || 'อื่นๆ',
      visible: true
    }));
  } catch(e) {
    console.error('loadFoods error:', e);
    allFoods = [];
  }
  applyFilter();
}

// ── FILTER & SEARCH ──
function setFilter(cat, btn) {
  currentFilter = cat;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function onSearch() {
  searchQ = document.getElementById('searchInput').value.toLowerCase().trim();
  currentPage = 1;
  applyFilter();
}

function applyFilter() {
  filtered = allFoods.filter(f => {
    if(!f.visible) return false;
    if(currentFilter !== 'all' && f.cat !== currentFilter) return false;
    if(searchQ && !f.name.toLowerCase().includes(searchQ)) return false;
    return true;
  });
  renderGrid();
}

// ── RENDER GRID ──
function renderGrid() {
  const grid = document.getElementById('foodGrid');
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if(currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);

  if(!page.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>ไม่พบเมนูที่ค้นหา</div></div>';
    renderPaging(0, 1);
    return;
  }

  grid.innerHTML = page.map(f => {
    const qty = meal[f.id]?.qty || 0;
    const color = CAT_COLORS[f.cat] || 'var(--blue)';
    return `<div class="food-card ${qty>0?'selected':''}" style="--cat-color:${color}" onclick="addFood('${f.id}')">
      <span class="food-cat-badge">${f.cat}</span>
      <span class="food-icon">${f.icon}</span>
      <div class="food-name">${f.name}</div>
      <div class="food-meta">${f.unit}</div>
      <div class="food-cal">${f.cal} kcal</div>
      ${qty>0?`<div class="food-qty-row">
        <button class="qty-btn" onclick="event.stopPropagation();removeFood('${f.id}')">−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="event.stopPropagation();addFood('${f.id}')">+</button>
      </div>`:''}
    </div>`;
  }).join('');

  renderPaging(total, totalPages);
}

function renderPaging(total, totalPages) {
  const pg = document.getElementById('paging');
  if(totalPages <= 1){ pg.innerHTML=''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=totalPages;i++){
    if(totalPages>5 && i>2 && i<totalPages-1 && Math.abs(i-currentPage)>1){
      if(i===3||i===totalPages-2) html+='<span class="page-info">…</span>';
      continue;
    }
    html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  html+=`<span class="page-info">${(currentPage-1)*PER_PAGE+1}–${Math.min(currentPage*PER_PAGE,total)} / ${total}</span>`;
  pg.innerHTML = html;
}

function goPage(p){ currentPage=p; renderGrid(); window.scrollTo({top:200,behavior:'smooth'}); }

// ── MEAL LOG ──
function addFood(id) {
  const f = allFoods.find(x=>x.id===id);
  if(!f) return;
  if(!meal[id]) meal[id] = { ...f, qty: 0 };
  meal[id].qty++;
  renderMeal();
  renderGrid();
  showToast(`+${f.cal} kcal — ${f.name}`);
}
function removeFood(id) {
  if(!meal[id]) return;
  meal[id].qty--;
  if(meal[id].qty<=0) delete meal[id];
  renderMeal();
  renderGrid();
}
function clearMeal(){ meal={}; renderMeal(); renderGrid(); }

function renderMeal() {
  const items = Object.values(meal);
  const total = items.reduce((s,f)=>s+f.cal*f.qty,0);
  const summary = document.getElementById('mealSummary');
  document.getElementById('mealTotalVal').textContent = total.toLocaleString();
  document.getElementById('mealItems').innerHTML = items.map(f=>`
    <div class="meal-chip">
      ${f.icon} ${f.name}${f.qty>1?` ×${f.qty}`:''}
      <span class="meal-chip-remove" onclick="removeFood('${f.id}')">✕</span>
    </div>`).join('');
  summary.classList.toggle('empty', items.length===0);

  // Update TDEE progress if available
  if(tdeeData) {
    const pct = Math.min(100, Math.round((total/tdeeData.target)*100));
    const fillEl = document.getElementById('tdeeProgressFill');
    const pctEl = document.getElementById('tdeeProgressPct');
    const remEl = document.getElementById('tdeeRemaining');
    if(fillEl) fillEl.style.width = pct+'%';
    if(pctEl) pctEl.textContent = pct+'%';
    if(remEl) remEl.textContent = Math.max(0,tdeeData.target-total).toLocaleString()+' kcal เหลือ';
  }
}

// ── TDEE ──
function toggleTDEE() {
  document.getElementById('tdeeCard').classList.toggle('open');
}

function calcTDEE() {
  const gender = document.getElementById('td_gender').value;
  const age = parseInt(document.getElementById('td_age').value)||0;
  const weight = parseFloat(document.getElementById('td_weight').value)||0;
  const height = parseFloat(document.getElementById('td_height').value)||0;
  const activity = parseFloat(document.getElementById('td_activity').value)||1.55;
  const goal = parseFloat(document.getElementById('td_goal').value)||1.0;

  if(!age||!weight||!height){ showToast('กรุณากรอกข้อมูลให้ครบ'); return; }

  // Mifflin-St Jeor BMR
  let bmr;
  if(gender==='male') bmr = 10*weight + 6.25*height - 5*age + 5;
  else bmr = 10*weight + 6.25*height - 5*age - 161;

  const tdee = Math.round(bmr * activity);
  const target = Math.round(tdee * goal);
  const bmi = +(weight / ((height/100)**2)).toFixed(1);

  tdeeData = { bmr:Math.round(bmr), tdee, target, bmi };
  localStorage.setItem('food_profile', JSON.stringify({gender,age,weight,height,activity,goal}));
  renderTDEE();
  document.getElementById('tdeeCard').classList.add('open');
  showToast('✓ บันทึกข้อมูลแล้ว');
}

function renderTDEE() {
  if(!tdeeData) return;
  const eaten = Object.values(meal).reduce((s,f)=>s+f.cal*f.qty,0);
  const pct = Math.min(100, Math.round((eaten/tdeeData.target)*100));
  const remaining = Math.max(0, tdeeData.target - eaten);
  document.getElementById('tdeeNums').innerHTML = `
    <div class="tdee-num"><div class="tdee-num-val">${tdeeData.target.toLocaleString()}</div><div class="tdee-num-label">เป้าหมาย (kcal)</div></div>
    <div class="tdee-num"><div class="tdee-num-val" style="color:var(--yellow)">${eaten.toLocaleString()}</div><div class="tdee-num-label">กินแล้ว</div></div>
    <div class="tdee-num"><div class="tdee-num-val" style="color:var(--blue)">${remaining.toLocaleString()}</div><div class="tdee-num-label">เหลือ</div></div>
    <div class="tdee-num"><div class="tdee-num-val" style="color:var(--purple)">${tdeeData.bmi}</div><div class="tdee-num-label">BMI</div></div>
    <div class="tdee-progress" style="width:100%;grid-column:1/-1">
      <div class="tdee-progress-label"><span id="tdeeProgressPct">${pct}%</span><span id="tdeeRemaining">${remaining.toLocaleString()} kcal เหลือ</span></div>
      <div class="tdee-progress-bar"><div class="tdee-progress-fill" id="tdeeProgressFill" style="width:${pct}%;background:${pct>100?'var(--red)':'linear-gradient(90deg,var(--green),var(--blue))'}"></div></div>
    </div>`;
}

function loadProfile() {
  const saved = localStorage.getItem('food_profile');
  if(!saved) return;
  try {
    const p = JSON.parse(saved);
    document.getElementById('td_gender').value = p.gender||'male';
    document.getElementById('td_age').value = p.age||'';
    document.getElementById('td_weight').value = p.weight||'';
    document.getElementById('td_height').value = p.height||'';
    document.getElementById('td_activity').value = p.activity||'1.55';
    document.getElementById('td_goal').value = p.goal||'1.0';
    // Auto-calc
    const g=p.gender,age=p.age,w=p.weight,h=p.height,a=p.activity||1.55,goal=p.goal||1;
    let bmr = g==='male'?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161;
    const tdee=Math.round(bmr*a), target=Math.round(tdee*goal), bmi=+(w/((h/100)**2)).toFixed(1);
    tdeeData={bmr:Math.round(bmr),tdee,target,bmi};
    renderTDEE();
  } catch(e){}
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

init();
</script>
